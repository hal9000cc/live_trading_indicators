[tox]
envlist = py39, py310, py311, py312, py313, py314
min_version = 4.0
skip_missing_interpreters = false

[testenv]
description = Run full pytest suite under {basepython}
package = wheel
wheel_build_env = .pkg
extras = all
deps =
    pytest
    ccxt
    pandas
    stock-indicators
setenv =
    DOTNET_ROOT = /usr/lib/dotnet
    PYTHONPATH = {toxinidir}/src:{toxinidir}/tests
commands =
    pytest -m "not slow" {posargs}

[testenv:py39]
basepython = /home/hal/.pyenv/versions/3.9.25/bin/python

[testenv:py310]
basepython = /home/hal/.pyenv/versions/3.10.13/bin/python

[testenv:py311]
basepython = /usr/bin/python3.11

[testenv:py312]
basepython = /home/hal/.pyenv/versions/3.12.3/bin/python

[testenv:py313]
basepython = /home/hal/.pyenv/versions/3.13.12/bin/python

[testenv:py314]
basepython = /home/hal/.pyenv/versions/3.14.3/bin/python